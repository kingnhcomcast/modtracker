<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Chart Detail</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      margin: 24px auto;
      max-width: 1200px;
      line-height: 1.4;
      color: #1f2937;
      background: #f7f9f8;
    }
    h1, h2 {
      margin: 0 0 12px 0;
    }
    a {
      color: #0f766e;
    }
    .shell {
      border: 1px solid #d7e2da;
      border-radius: 8px;
      padding: 16px;
      background: #ffffff;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.05);
    }
    .muted {
      color: #6b7280;
    }
    .error {
      color: #b91c1c;
      font-weight: 600;
    }
    img {
      width: 100%;
      height: auto;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      margin-top: 8px;
      margin-bottom: 18px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 14px;
      background: #fff;
    }
    th, td {
      border: 1px solid #d1d5db;
      padding: 6px 8px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #e8f5e9;
      color: #14532d;
    }
    .release-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      margin: 10px 0 12px 0;
      font-size: 13px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-swatch {
      width: 14px;
      height: 14px;
      border: 1px solid #9ca3af;
      border-radius: 3px;
      display: inline-block;
    }
  </style>
</head>
<body>
<div class="shell">
  <p style="margin-top: 0;"><a href="./index.html">Back to Dashboard</a></p>
  <h1 id="title">Chart Detail</h1>
  <p id="scope" class="muted"></p>
  <img id="chart-img" alt="Chart image" />
  <div id="table-wrap" class="muted">Loading...</div>
</div>

<script>
  const TITLE_MAP = {
    platform: 'Daily Downloads by Platform',
    loader: 'Daily Downloads by Loader',
    mc: 'Daily Downloads by Minecraft Version (Top 8)',
    mod: 'Daily Downloads by Mod Version (Top 8)',
    totalDaily: 'Total Daily Downloads',
    totalDailyStackedBar: 'Daily Downloads by Project (Stacked)',
    totalDailyBar: 'Total Downloads by Project (Cumulative)',
  };

  const CSV_BY_CHART = {
    platform: './daily_project_totals.csv',
    loader: './daily_loader_totals.csv',
    mc: './daily_mc_version_totals.csv',
    mod: './daily_mod_version_totals.csv',
    totalDaily: './daily_project_totals.csv',
    totalDailyStackedBar: './daily_project_totals.csv',
    totalDailyBar: './daily_project_totals.csv',
  };

  function splitCsvLine(line) {
    const out = [];
    let cur = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i += 1) {
      const ch = line[i];
      if (ch === '"' && line[i + 1] === '"') {
        cur += '"';
        i += 1;
      } else if (ch === '"') {
        inQuotes = !inQuotes;
      } else if (ch === ',' && !inQuotes) {
        out.push(cur);
        cur = '';
      } else {
        cur += ch;
      }
    }
    out.push(cur);
    return out;
  }

  function parseCsv(text) {
    const lines = String(text || '').trim().split(/\r?\n/);
    if (lines.length < 2) return [];
    const headers = splitCsvLine(lines[0]).map((h) => h.trim());
    return lines.slice(1).filter(Boolean).map((line) => {
      const cells = splitCsvLine(line);
      const row = {};
      headers.forEach((h, i) => {
        row[h] = (cells[i] ?? '').trim();
      });
      return row;
    });
  }

  function toInt(value) {
    const n = Number(value);
    return Number.isFinite(n) ? n : 0;
  }

  function groupRows(rows, keyFn, seedFn, sumField) {
    const map = new Map();
    rows.forEach((row) => {
      const key = keyFn(row);
      if (!key) return;
      if (!map.has(key)) map.set(key, seedFn(row));
      map.get(key)[sumField] += toInt(row.daily_downloads);
    });
    return Array.from(map.values());
  }

  function sortByDateThen(rows, key) {
    return rows.sort((a, b) => {
      const d = String(a.snapshot_date).localeCompare(String(b.snapshot_date));
      if (d !== 0) return d;
      return String(a[key]).localeCompare(String(b[key]));
    });
  }

  function topSeries(rows, key) {
    const totals = new Map();
    rows.forEach((r) => {
      const k = String(r[key] ?? '');
      if (!k) return;
      totals.set(k, (totals.get(k) || 0) + toInt(r.daily_downloads));
    });
    const top = new Set(
      Array.from(totals.entries())
        .sort((a, b) => b[1] - a[1])
        .slice(0, 8)
        .map((x) => x[0])
    );
    return rows.filter((r) => top.has(String(r[key] ?? '')));
  }

  function hexToRgba(hex, alpha) {
    const h = String(hex || '').replace('#', '').trim();
    if (!/^[0-9a-fA-F]{6}$/.test(h)) return `rgba(0,0,0,${alpha})`;
    const r = parseInt(h.slice(0, 2), 16);
    const g = parseInt(h.slice(2, 4), 16);
    const b = parseInt(h.slice(4, 6), 16);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
  }

  function colorForTagIndex(index) {
    const palette = ['#0072B2', '#D62728', '#CC79A7', '#E69F00', '#56B4E9', '#F0E442', '#332288', '#AA4499'];
    return palette[index % palette.length];
  }

  function normalizedReleaseProjectKey(projectName) {
    let key = String(projectName || '').trim().toLowerCase();
    while (true) {
      const stripped = key.replace(/\s*\([^)]*\)\s*$/, '').trim();
      if (stripped === key) return key;
      key = stripped;
    }
  }

  function buildTable(columns, rows, options = {}) {
    if (!rows.length) {
      const p = document.createElement('p');
      p.className = 'muted';
      p.textContent = 'No data.';
      return p;
    }

    const table = document.createElement('table');
    const thead = document.createElement('thead');
    const hr = document.createElement('tr');
    columns.forEach((col) => {
      const th = document.createElement('th');
      th.textContent = col;
      hr.appendChild(th);
    });
    thead.appendChild(hr);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    rows.forEach((row) => {
      const tr = document.createElement('tr');
      if (typeof options.rowStyle === 'function') {
        options.rowStyle(tr, row);
      }
      columns.forEach((col) => {
        const td = document.createElement('td');
        td.textContent = String(row[col] ?? '');
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    return table;
  }

  function transformRows(rows, chart) {
    if (chart === 'platform') {
      return sortByDateThen(
        groupRows(rows, (r) => `${r.snapshot_date}|${r.platform}`, (r) => ({
          snapshot_date: r.snapshot_date,
          platform: r.platform || 'unknown',
          daily_downloads: 0,
        }), 'daily_downloads'),
        'platform'
      );
    }
    if (chart === 'loader') {
      return sortByDateThen(
        groupRows(rows, (r) => `${r.snapshot_date}|${r.loader_group}`, (r) => ({
          snapshot_date: r.snapshot_date,
          loader_group: r.loader_group || 'unknown',
          daily_downloads: 0,
        }), 'daily_downloads'),
        'loader_group'
      );
    }
    if (chart === 'mc') {
      const grouped = sortByDateThen(
        groupRows(rows, (r) => `${r.snapshot_date}|${r.mc_version}`, (r) => ({
          snapshot_date: r.snapshot_date,
          mc_version: r.mc_version || 'unknown',
          daily_downloads: 0,
        }), 'daily_downloads'),
        'mc_version'
      );
      return topSeries(grouped, 'mc_version');
    }
    if (chart === 'mod') {
      const grouped = sortByDateThen(
        groupRows(rows, (r) => `${r.snapshot_date}|${r.mod_version}`, (r) => ({
          snapshot_date: r.snapshot_date,
          mod_version: r.mod_version || 'unknown',
          daily_downloads: 0,
        }), 'daily_downloads'),
        'mod_version'
      );
      return topSeries(grouped, 'mod_version');
    }

    const totalsByProject = sortByDateThen(
      groupRows(
        rows,
        (r) => `${r.snapshot_date}|${r.project_name || 'unknown'}`,
        (r) => ({
          snapshot_date: r.snapshot_date,
          project_name: r.project_name || 'unknown',
          daily_downloads: 0,
        }),
        'daily_downloads'
      ),
      'project_name'
    );

    if (chart === 'totalDaily' || chart === 'totalDailyStackedBar') return totalsByProject;

    if (chart === 'totalDailyBar') {
      const dates = Array.from(new Set(totalsByProject.map((r) => String(r.snapshot_date || '')).filter(Boolean)))
        .sort((a, b) => a.localeCompare(b));
      const projectNames = Array.from(new Set(totalsByProject.map((r) => String(r.project_name || 'unknown'))))
        .sort((a, b) => a.localeCompare(b));
      const dailyByDateProject = new Map();
      totalsByProject.forEach((r) => {
        dailyByDateProject.set(`${r.snapshot_date}|${r.project_name}`, toInt(r.daily_downloads));
      });

      const runningByProject = new Map(projectNames.map((name) => [name, 0]));
      const out = [];
      dates.forEach((date) => {
        projectNames.forEach((projectName) => {
          const running = (runningByProject.get(projectName) || 0)
            + (dailyByDateProject.get(`${date}|${projectName}`) || 0);
          runningByProject.set(projectName, running);
          out.push({
            snapshot_date: date,
            project_name: projectName,
            cumulative_downloads: running,
          });
        });
      });
      return out;
    }

    return [];
  }

  function tableColumnsForChart(chart) {
    if (chart === 'platform') return ['snapshot_date', 'platform', 'daily_downloads'];
    if (chart === 'loader') return ['snapshot_date', 'loader_group', 'daily_downloads'];
    if (chart === 'mc') return ['snapshot_date', 'mc_version', 'daily_downloads'];
    if (chart === 'mod') return ['snapshot_date', 'mod_version', 'daily_downloads'];
    if (chart === 'totalDailyBar') return ['snapshot_date', 'cumulative_downloads'];
    return ['snapshot_date', 'daily_downloads'];
  }

  function metricColumnForChart(chart) {
    return chart === 'totalDailyBar' ? 'cumulative_downloads' : 'daily_downloads';
  }

  function seriesKeyForChart(chart) {
    if (chart === 'platform') return 'platform';
    if (chart === 'loader') return 'loader_group';
    if (chart === 'mc') return 'mc_version';
    if (chart === 'mod') return 'mod_version';
    if (chart === 'totalDaily' || chart === 'totalDailyStackedBar' || chart === 'totalDailyBar') return 'project_name';
    return null;
  }

  function buildPivotTableData(chart, rows) {
    const seriesKey = seriesKeyForChart(chart);
    const metricColumn = metricColumnForChart(chart);
    if (!seriesKey) {
      const outRows = rows.map((row) => ({
        ...row,
        total: toInt(row[metricColumn]),
      }));
      return {
        columns: [...tableColumnsForChart(chart), 'total'],
        rows: outRows,
      };
    }

    const seriesNames = Array.from(new Set(
      rows.map((r) => String(r[seriesKey] ?? 'unknown')).filter(Boolean)
    )).sort((a, b) => a.localeCompare(b));

    const byDate = new Map();
    rows.forEach((row) => {
      const date = String(row.snapshot_date ?? '');
      if (!date) return;
      if (!byDate.has(date)) byDate.set(date, { snapshot_date: date });
      const out = byDate.get(date);
      const series = String(row[seriesKey] ?? 'unknown');
      out[series] = toInt(row[metricColumn]);
    });

    const pivotRows = Array.from(byDate.values())
      .sort((a, b) => String(a.snapshot_date).localeCompare(String(b.snapshot_date)));
    pivotRows.forEach((row) => {
      row.total = seriesNames.reduce((sum, series) => sum + toInt(row[series]), 0);
    });
    const columns = ['snapshot_date', ...seriesNames, 'total'];
    return { columns, rows: pivotRows };
  }

  function buildReleaseTagContext(summary, project) {
    const projectKey = normalizedReleaseProjectKey(project);
    const releaseTags = Array.isArray(summary && summary.release_tags) ? summary.release_tags : [];
    const byDate = new Map();
    const labels = [];

    releaseTags.forEach((t) => {
      const date = String(t.release_date || '').trim();
      const rawProject = String(t.project_name || '').trim();
      const tag = String(t.tag || '').trim();
      if (!date || !tag) return;
      const releaseProjectKey = rawProject.toLowerCase();
      if (projectKey && releaseProjectKey !== projectKey && normalizedReleaseProjectKey(rawProject) !== projectKey) return;
      const label = projectKey ? tag : (rawProject ? `${rawProject}:${tag}` : tag);
      if (!byDate.has(date)) byDate.set(date, []);
      byDate.get(date).push(label);
      labels.push(label);
    });

    const uniqueLabels = Array.from(new Set(labels)).sort((a, b) => a.localeCompare(b));
    const colorByLabel = new Map(uniqueLabels.map((l, i) => [l, colorForTagIndex(i)]));
    return { byDate, uniqueLabels, colorByLabel };
  }

  function renderReleaseLegend(container, releaseCtx) {
    if (!releaseCtx.uniqueLabels.length) return;
    const legend = document.createElement('div');
    legend.className = 'release-legend';
    releaseCtx.uniqueLabels.forEach((label) => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      const swatch = document.createElement('span');
      swatch.className = 'legend-swatch';
      swatch.style.backgroundColor = hexToRgba(releaseCtx.colorByLabel.get(label), 0.28);
      const text = document.createElement('span');
      text.textContent = label;
      item.appendChild(swatch);
      item.appendChild(text);
      legend.appendChild(item);
    });
    container.appendChild(legend);
  }

  function applyReleaseRowStyle(releaseCtx, tr, row) {
    const date = String(row.snapshot_date || '').trim();
    if (!date) return;
    const labels = Array.from(new Set((releaseCtx.byDate.get(date) || []).filter(Boolean)));
    if (!labels.length) return;
    const colors = labels.map((l) => releaseCtx.colorByLabel.get(l)).filter(Boolean);
    if (!colors.length) return;
    if (colors.length === 1) {
      tr.style.backgroundColor = hexToRgba(colors[0], 0.22);
      return;
    }
    const segment = 100 / colors.length;
    const stops = colors.map((c, i) => {
      const start = (segment * i).toFixed(2);
      const end = (segment * (i + 1)).toFixed(2);
      const rgba = hexToRgba(c, 0.20);
      return `${rgba} ${start}%, ${rgba} ${end}%`;
    }).join(', ');
    tr.style.background = `linear-gradient(90deg, ${stops})`;
  }

  async function run() {
    const params = new URLSearchParams(window.location.search);
    const chart = params.get('chart') || '';
    const imagePath = params.get('image') || '';
    const project = params.get('project') || '';
    const title = TITLE_MAP[chart];
    const csvPath = CSV_BY_CHART[chart];

    if (!title || !csvPath || !imagePath || imagePath.includes('..')) {
      const wrap = document.getElementById('table-wrap');
      wrap.className = 'error';
      wrap.textContent = 'Invalid chart request.';
      return;
    }

    document.getElementById('title').textContent = title;
    document.getElementById('scope').textContent = project
      ? `Project: ${project}`
      : 'Scope: All projects';
    const img = document.getElementById('chart-img');
    img.src = `${imagePath}?v=${Date.now()}`;

    const [csvText, summary] = await Promise.all([
      fetch(`${csvPath}?v=${Date.now()}`, { cache: 'no-store' }).then((r) => r.text()),
      fetch(`./summary.json?v=${Date.now()}`, { cache: 'no-store' }).then((r) => r.json()).catch(() => ({})),
    ]);
    let rows = parseCsv(csvText);
    if (project) {
      const projectKey = String(project).trim().toLowerCase();
      rows = rows.filter((r) => String(r.project_name || '').trim().toLowerCase() === projectKey);
    }
    const transformed = transformRows(rows, chart);
    const releaseCtx = buildReleaseTagContext(summary, project);

    const wrap = document.getElementById('table-wrap');
    wrap.textContent = '';
    renderReleaseLegend(wrap, releaseCtx);
    const pivoted = buildPivotTableData(chart, transformed);
    wrap.appendChild(buildTable(pivoted.columns, pivoted.rows, {
      rowStyle: (tr, row) => applyReleaseRowStyle(releaseCtx, tr, row),
    }));
  }

  run().catch(() => {
    const wrap = document.getElementById('table-wrap');
    wrap.className = 'error';
    wrap.textContent = 'Could not load chart data.';
  });
</script>
</body>
</html>
