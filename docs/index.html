<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mod Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      line-height: 1.4;
      color: #1f2937;
    }
    h1, h2, h3 {
      margin: 0 0 10px 0;
    }
    section {
      margin-top: 24px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 10px 0 18px 0;
      font-size: 14px;
    }
    th, td {
      border: 1px solid #d1d5db;
      padding: 6px 8px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f3f4f6;
    }
    .muted {
      color: #6b7280;
    }
    .error {
      color: #b91c1c;
      font-weight: 600;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }
    .stat {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 10px;
      background: #fafafa;
    }
    .stat .label {
      font-size: 12px;
      color: #6b7280;
    }
    .stat .value {
      font-size: 20px;
      font-weight: 700;
      margin-top: 4px;
    }
    .section-card {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 12px;
      margin-top: 12px;
      background: #fff;
    }
    .downloads-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(320px, 460px));
      gap: 12px;
      align-items: start;
      margin-top: 12px;
    }
    .downloads-grid .section-card {
      margin-top: 0;
    }
    .downloads-grid table {
      width: auto;
      min-width: 300px;
    }
    @media (max-width: 900px) {
      .downloads-grid {
        grid-template-columns: 1fr;
      }
      .downloads-grid table {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<h1>Mod Tracker</h1>
<p id="meta">Loading summary...</p>

<h2>Charts</h2>
<ul>
    <li><a href="./charts/daily_downloads_by_platform.png">Daily Downloads by Platform</a></li>
    <li><a href="./charts/daily_downloads_by_loader.png">Daily Downloads by Loader</a></li>
    <li><a href="./charts/daily_downloads_by_mc_version_top8.png">Daily Downloads by MC Version</a></li>
    <li><a href="./charts/daily_downloads_by_mod_version_top8.png">Daily Downloads by Mod Version</a></li>
    <li><a href="./run.log">Latest Run Log</a></li>
</ul>

<h2>Summary</h2>
<div id="summary" class="muted">Loading summary...</div>

<script>
  function buildTable(columns, rows) {
    const table = document.createElement('table');
    const thead = document.createElement('thead');
    const headerRow = document.createElement('tr');
    columns.forEach((col) => {
      const th = document.createElement('th');
      th.textContent = col;
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    rows.forEach((row) => {
      const tr = document.createElement('tr');
      columns.forEach((col) => {
        const td = document.createElement('td');
        td.textContent = row[col] ?? '';
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    return table;
  }

  function addSummaryTable(container, title, rows) {
    const card = document.createElement('div');
    card.className = 'section-card';
    const h3 = document.createElement('h3');
    h3.textContent = title;
    card.appendChild(h3);

    if (!rows || rows.length === 0) {
      const p = document.createElement('p');
      p.className = 'muted';
      p.textContent = 'No data.';
      card.appendChild(p);
      container.appendChild(card);
      return;
    }

    const columns = Object.keys(rows[0]);
    card.appendChild(buildTable(columns, rows));
    container.appendChild(card);
  }

  function combineTotalsAndDaily(labelKey, totalsRows, dailyRows) {
    const byKey = new Map();

    (totalsRows || []).forEach((row) => {
      const key = String(row[labelKey] ?? '');
      if (!key) return;
      if (!byKey.has(key)) byKey.set(key, { [labelKey]: key, total: 0, yesterday: 'n/a' });
      byKey.get(key).total = Number(row.total_downloads ?? 0);
    });

    (dailyRows || []).forEach((row) => {
      const key = String(row[labelKey] ?? '');
      if (!key) return;
      if (!byKey.has(key)) byKey.set(key, { [labelKey]: key, total: 0, yesterday: 'n/a' });
      const daily = row.daily_downloads;
      byKey.get(key).yesterday = (daily === null || daily === undefined) ? 'n/a' : Number(daily);
    });

    return Array.from(byKey.values()).sort((a, b) => Number(b.total ?? 0) - Number(a.total ?? 0));
  }

  fetch('./summary.json')
    .then((r) => r.json())
    .then((s) => {
      document.getElementById('meta').textContent =
        `Generated UTC date: ${s.generated_utc_date} | Spike count: ${s.spike_count}`;

      const root = document.getElementById('summary');
      root.className = '';
      root.textContent = '';

      const stats = document.createElement('div');
      stats.className = 'grid';
      const statData = [
        { label: 'Generated UTC Date', value: s.generated_utc_date ?? 'n/a' },
        { label: 'Tracked Projects', value: (s.projects || []).length },
        { label: 'Rows Captured Today', value: s.today_item_rows_count ?? 'n/a' },
        { label: 'Spike Count', value: s.spike_count ?? 'n/a' },
      ];
      statData.forEach((x) => {
        const box = document.createElement('div');
        box.className = 'stat';
        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = x.label;
        const value = document.createElement('div');
        value.className = 'value';
        value.textContent = String(x.value);
        box.appendChild(label);
        box.appendChild(value);
        stats.appendChild(box);
      });
      root.appendChild(stats);

      const downloadsGrid = document.createElement('div');
      downloadsGrid.className = 'downloads-grid';
      root.appendChild(downloadsGrid);

      addSummaryTable(
        downloadsGrid,
        'Platform Downloads',
        combineTotalsAndDaily('platform', s.latest_platform_totals, s.latest_platform_breakdown)
      );
      addSummaryTable(
        downloadsGrid,
        'Loader Downloads',
        combineTotalsAndDaily('loader_group', s.latest_loader_totals, s.latest_loader_breakdown)
      );
      addSummaryTable(
        downloadsGrid,
        'Minecraft Version Downloads',
        combineTotalsAndDaily('mc_version', s.latest_mc_totals, s.latest_mc_breakdown)
      );
      addSummaryTable(
        downloadsGrid,
        'Mod Version Downloads',
        combineTotalsAndDaily('mod_version', s.latest_mod_totals, s.latest_mod_breakdown)
      );
    })
    .catch(() => {
      document.getElementById('meta').textContent = 'summary.json not found yet.';
      const root = document.getElementById('summary');
      root.className = 'error';
      root.textContent = 'Could not load summary.json.';
    });
</script>
<section>
  <h2>Run Log Tables</h2>
  <p class="muted">Use the raw log instead of inline tables: <a href="./run.log">Open run.log</a></p>
</section>
</body>
</html>
