name: Daily Mod Tracker

on:
  schedule:
    - cron: "0 4,5 * * *" # handles DST for America/New_York midnight
  workflow_dispatch:

concurrency:
  group: daily-tracker-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install cloudscraper matplotlib requests beautifulsoup4

      - name: Run only at midnight ET
        run: |
          HOUR=$(TZ=America/New_York date +%H)
          if [ "$HOUR" != "00" ]; then
            echo "Not midnight ET; exiting."
            exit 0
          fi

      - name: Run tracker
        run: |
          mkdir -p tracker_output
          python mod_download_tracker.py 2>&1 | tee tracker_output/run.log

      - name: Copy tracker_output to docs
        run: |
          mkdir -p docs
          cp -r tracker_output/* docs/

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs mod_downloads.sqlite3
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Daily tracker update"

          # Rebase on top of latest remote, then push; retry on races.
          for i in 1 2 3; do
            git fetch origin main
            if git rebase origin/main && git push origin HEAD:main; then
              exit 0
            fi
            echo "Attempt $i failed; retrying..."
            git rebase --abort || true
            sleep 5
          done

          echo "Push failed after retries."
          exit 1
          
